name: Build & Release APKs

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0-dev)"
        required: true
        default: "v0.1.0-dev"
      version_name:
        description: "App versionName"
        required: true
        default: "0.1.0-dev"
      version_code:
        description: "App versionCode"
        required: true
        default: "1"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build APKs and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK platform & build-tools
        run: |
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0" > /dev/null

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ─── Debug build ───────────────────────────────────────────────────────
      - name: Build debug APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace \
            -PversionName=${{ inputs.version_name }} \
            -PversionCode=${{ inputs.version_code }}

      # ─── Generate a release signing key (ephemeral, for this build) ────────
      - name: Generate signing keystore
        run: |
          STORE_PASS=$(openssl rand -base64 24)
          echo "KEYSTORE_PASSWORD=$STORE_PASS" >> "$GITHUB_ENV"

          keytool -genkeypair -v \
            -keystore vscodium-mobile.jks \
            -alias vscodiummobile \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STORE_PASS" -keypass "$STORE_PASS" \
            -dname "CN=VSCodium Mobile, OU=BorgorNinja, O=BorgorNinja, L=Unknown, ST=Unknown, C=US"

          cat > keystore.properties << EOF
          storeFile=$(pwd)/vscodium-mobile.jks
          storePassword=$STORE_PASS
          keyAlias=vscodiummobile
          keyPassword=$STORE_PASS
          EOF

      # ─── Signed release build ───────────────────────────────────────────────
      - name: Build signed release APK
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -PversionName=${{ inputs.version_name }} \
            -PversionCode=${{ inputs.version_code }}

      - name: Rename APKs for release
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/vscodium-mobile-${{ inputs.version_name }}-debug.apk
          cp app/build/outputs/apk/release/app-release.apk out/vscodium-mobile-${{ inputs.version_name }}-release-signed.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscodium-mobile-debug
          path: out/*-debug.apk

      - name: Upload signed release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscodium-mobile-release-signed
          path: out/*-release-signed.apk

      - name: Upload signing keystore (keep this safe for future updates!)
        uses: actions/upload-artifact@v4
        with:
          name: signing-keystore
          path: |
            vscodium-mobile.jks
            keystore.properties
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: VSCodium Mobile ${{ inputs.tag }}
          body: |
            Initial automated build of VSCodium Mobile.

            - `*-debug.apk` — unsigned debug build (debuggable, no minification).
            - `*-release-signed.apk` — minified, R8-shrunk release build signed
              with a freshly generated key for this build. The keystore used to
              sign this build is uploaded as the `signing-keystore` workflow
              artifact — download and keep it safe if you plan to publish
              future updates that need to share the same signing key.
          files: |
            out/*-debug.apk
            out/*-release-signed.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
