name: Build & Release APKs

on:
  workflow_run:
    workflows: ["Build Debug APK"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Leave empty to auto-increment from the latest release."
        required: false
        default: ""
      version_name:
        description: "App versionName. Leave empty to auto-increment."
        required: false
        default: ""
      version_code:
        description: "App versionCode. Leave empty to use the run number."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build APKs and publish release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_VERSION_NAME: ${{ inputs.version_name }}
          INPUT_VERSION_CODE: ${{ inputs.version_code }}
        run: |
          if [ -n "$INPUT_TAG" ] && [ -n "$INPUT_VERSION_NAME" ]; then
            TAG="$INPUT_TAG"
            VERSION_NAME="$INPUT_VERSION_NAME"
          else
            LATEST_TAG=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('tag_name',''))")

            if [ -z "$LATEST_TAG" ]; then
              LATEST_TAG="v0.1.0"
            fi

            VER=${LATEST_TAG#v}
            MAJOR=$(echo "$VER" | cut -d. -f1)
            MINOR=$(echo "$VER" | cut -d. -f2)
            PATCH=$(echo "$VER" | cut -d. -f3)
            MAJOR=${MAJOR:-0}
            MINOR=${MINOR:-1}
            PATCH=${PATCH:-0}

            VERSION_NAME="${MAJOR}.${MINOR}.$((PATCH + 1))"
            TAG="v${VERSION_NAME}"
          fi

          if [ -n "$INPUT_VERSION_CODE" ]; then
            VERSION_CODE="$INPUT_VERSION_CODE"
          else
            VERSION_CODE="${{ github.run_number }}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $TAG (versionName=$VERSION_NAME, versionCode=$VERSION_CODE)"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK platform & build-tools
        run: |
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0" > /dev/null

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ─── Debug build ───────────────────────────────────────────────────────
      - name: Build debug APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace \
            -PversionName=${{ steps.version.outputs.version_name }} \
            -PversionCode=${{ steps.version.outputs.version_code }}

      # ─── Generate a release signing key (ephemeral, for this build) ────────
      - name: Generate signing keystore
        run: |
          STORE_PASS=$(openssl rand -base64 24)
          echo "KEYSTORE_PASSWORD=$STORE_PASS" >> "$GITHUB_ENV"

          keytool -genkeypair -v \
            -keystore vscodium-mobile.jks \
            -alias vscodiummobile \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STORE_PASS" -keypass "$STORE_PASS" \
            -dname "CN=VSCodium Mobile, OU=BorgorNinja, O=BorgorNinja, L=Unknown, ST=Unknown, C=US"

          cat > keystore.properties << EOF
          storeFile=$(pwd)/vscodium-mobile.jks
          storePassword=$STORE_PASS
          keyAlias=vscodiummobile
          keyPassword=$STORE_PASS
          EOF

      # ─── Signed release build ───────────────────────────────────────────────
      - name: Build signed release APK
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -PversionName=${{ steps.version.outputs.version_name }} \
            -PversionCode=${{ steps.version.outputs.version_code }}

      - name: Rename APKs for release
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/vscodium-mobile-${{ steps.version.outputs.version_name }}-debug.apk
          cp app/build/outputs/apk/release/app-release.apk out/vscodium-mobile-${{ steps.version.outputs.version_name }}-release-signed.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscodium-mobile-debug
          path: out/*-debug.apk

      - name: Upload signed release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscodium-mobile-release-signed
          path: out/*-release-signed.apk

      - name: Upload signing keystore (keep this safe for future updates!)
        uses: actions/upload-artifact@v4
        with:
          name: signing-keystore-${{ steps.version.outputs.version_name }}
          path: |
            vscodium-mobile.jks
            keystore.properties
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: VSCodium Mobile ${{ steps.version.outputs.tag }}
          body: |
            Automated build of VSCodium Mobile (versionName ${{ steps.version.outputs.version_name }}, versionCode ${{ steps.version.outputs.version_code }}).

            - `*-debug.apk` — unsigned debug build (debuggable, no minification).
            - `*-release-signed.apk` — minified, R8-shrunk release build signed
              with a freshly generated key for this build. The keystore used to
              sign this build is uploaded as the `signing-keystore-${{ steps.version.outputs.version_name }}`
              workflow artifact — download and keep it safe if you plan to publish
              future updates that need to share the same signing key.
          files: |
            out/*-debug.apk
            out/*-release-signed.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
